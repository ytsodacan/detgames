<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game librabry</title>
    <style>
        /* Modern CSS Reset & Variables */
        :root {
            --bg-color: #0d0d12;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #00e5ff;
            --accent-hover: #00b3cc;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Frosted Glass Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 13, 18, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sleek Search Bar */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        #searchBar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchBar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Game Grid Layout */
        main {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        /* Game Card Styling & Animations */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 229, 255, 0.1);
            border-color: rgba(0, 229, 255, 0.3);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 16px;
            background-color: #222; /* Placeholder color while loading */
        }

        .card-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .card p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.4;
        }

        /* Download Button */
        .btn {
            display: block;
            text-align: center;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Loading Spinner */
        #loader {
            text-align: center;
            padding: 50px;
            color: var(--accent);
            font-size: 20px;
            font-weight: bold;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 229, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <h1>game librabry</h1>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search your library..." oninput="filterGames()">
        </div>
    </header>

    <main>
        <div id="loader">
            <div class="spinner"></div>
            <div>Loading Database...</div>
        </div>
        <div class="grid" id="gameGrid"></div>
    </main>

    <script>
        let gameDatabase = [];
        const grid = document.getElementById('gameGrid');
        const loader = document.getElementById('loader');

        // Helper function to fix Google Drive links automatically if you use them
        function formatDownloadLink(url) {
            if (url.includes("drive.google.com/file/d/")) {
                const fileId = url.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/uc?export=download&id=${fileId}`;
            }
            return url;
        }

        // Fetch the JSON data
        async function loadGames() {
            try {
                // Simulating a slight network delay so you can see the cool loading spinner
                await new Promise(resolve => setTimeout(resolve, 600)); 

                const response = await fetch('games.json');
                gameDatabase = await response.json();
                
                loader.style.display = 'none'; // Hide loader
                renderGames(gameDatabase);
            } catch (error) {
                loader.innerHTML = "❌ Failed to load games. Make sure games.json is in the same folder.";
                loader.style.color = "#ff4444";
                console.error("Error loading JSON:", error);
            }
        }

        // Render the HTML for the games
        function renderGames(games) {
            if (games.length === 0) {
                grid.innerHTML = `<div class="no-results">No games found matching your search.</div>`;
                return;
            }

            grid.innerHTML = games.map(game => `
                <div class="card">
                    <img src="${game.image}" alt="${game.name} cover art" loading="lazy">
                    <div class="card-info">
                        <div>
                            <h3>${game.name}</h3>
                            <p>${game.description || 'No description available.'}</p>
                        </div>
                        <a href="${formatDownloadLink(game.downloadUrl)}" class="btn" download>Download</a>
                    </div>
                </div>
            `).join('');
        }

        // Search filtering
        function filterGames() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = gameDatabase.filter(game => 
                game.name.toLowerCase().includes(query)
            );
            renderGames(filtered);
        }

        // Start the app
        loadGames();
    </script>

</body>
</html>
